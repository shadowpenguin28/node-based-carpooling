services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  web:
    build: .
    volumes:
      - .:/app
      - staticfiles:/app/static
    env_file:
      - ./.env

    depends_on:
      - db
  
  nginx:
    image: nginx
    ports:
    - 80:80 # expose nginx port 80 to the clients
    volumes:
      - staticfiles:/app/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  staticfiles: